name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Determine package to publish
        id: pkg
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [[ "$TAG" == lunch-money-cli-core-v* ]]; then
            echo "dir=packages/cli-core" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == lunch-money-cli-v* ]]; then
            echo "dir=packages/cli" >> "$GITHUB_OUTPUT"
          else
            echo "Unknown tag format: $TAG"
            exit 1
          fi

      - name: Publish package
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: npm publish --provenance --access public
