name: Release

on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - uses: actions/checkout@v6
        if: steps.release.outputs.pr
        with:
          ref: ${{ fromJson(steps.release.outputs.pr).headBranchName }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - uses: actions/setup-node@v6
        if: steps.release.outputs.pr
        with:
          node-version: 24
          cache: npm

      - name: Regenerate README with updated version
        if: steps.release.outputs.pr
        run: |
          npm ci
          npm run build
          npm run readme
          if git diff --quiet packages/cli/README.md; then
            echo "README is up to date"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add packages/cli/README.md
            git commit -m "chore: regenerate README for release"
            git push
          fi

      - name: Format generated files with prettier
        if: steps.release.outputs.pr
        run: |
          npm run format
          if git diff --quiet; then
            echo "All files are formatted"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: format generated files"
            git push
          fi
